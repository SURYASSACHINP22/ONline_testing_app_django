{% extends 'main.html' %}

{% block title %}Log in – OTS{% endblock %}

{% block top %}
    <a href="{% url 'OTS:registrationForm' %}" class="text-slate-600 hover:text-primary-600 font-medium transition">Sign up</a>
{% endblock %}

{% block content %}
    <div class="max-w-sm mx-auto">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <h1 class="text-xl font-semibold text-slate-800 mb-6">Log in</h1>
            {% if loginError %}
                <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100">{{ loginError }}</div>
            {% endif %}
            <form action="{% url 'OTS:login' %}" method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" class="flex-1 px-4 py-2 rounded-lg bg-primary-600 text-white font-medium hover:bg-primary-700 transition">Log in</button>
                    <button type="reset" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition">Reset</button>
                </div>
            </form>
            <p class="mt-4 text-sm text-slate-600">New here? <a href="{% url 'OTS:registrationForm' %}" class="text-primary-600 hover:underline font-medium">Sign up</a></p>
        </div>
    </div>
{% endblock %}
