<!DOCTYPE html>
{% load static %}
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OTS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        accent: { 500: '#8b5cf6', 600: '#7c3aed' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Highlight selected option in test form */
        input[type="radio"]:checked + span { font-weight: 600; }
        label:has(input[type="radio"]:checked) { border-color: rgb(34 197 94); background-color: rgb(240 253 244); }
    </style>
</head>
<body class="min-h-full bg-slate-50 font-sans antialiased">
    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
            <a href="{% url 'OTS:welcome' %}" class="text-lg font-semibold text-slate-800 hover:text-primary-600 transition">Online Testing System</a>
            <nav class="flex items-center gap-4">
                {% block top %}
                {% endblock %}
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
