{% extends 'main.html' %}

{% block title %}Sign up – OTS{% endblock %}

{% block top %}
    <a href="{% url 'OTS:welcome' %}" class="text-slate-600 hover:text-primary-600 font-medium transition">Home</a>
    <a href="{% url 'OTS:login' %}" class="text-slate-600 hover:text-primary-600 font-medium transition">Log in</a>
{% endblock %}

{% block content %}
    <div class="max-w-sm mx-auto">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <h1 class="text-xl font-semibold text-slate-800 mb-6">Create account</h1>
            <form method="post" action="{% url 'OTS:storeCandidate' %}" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                    <input type="text" name="name" id="name" required
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="membership_plan" class="block text-sm font-medium text-slate-700 mb-1">Membership plan (optional)</label>
                    <select name="membership_plan" id="membership_plan"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-white">
                        <option value="">— None —</option>
                        {% for plan in plans %}
                        <option value="{{ plan.pk }}">{{ plan.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" class="flex-1 px-4 py-2 rounded-lg bg-primary-600 text-white font-medium hover:bg-primary-700 transition">Sign up</button>
                    <button type="reset" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition">Reset</button>
                </div>
            </form>
            <p class="mt-4 text-sm text-slate-600">Already have an account? <a href="{% url 'OTS:login' %}" class="text-primary-600 hover:underline font-medium">Log in</a></p>
        </div>
    </div>
{% endblock %}
